name: Weekly Sprint Rotation

# Runs every Monday at 9:00 AM PST (17:00 UTC)
# Using cron format: minute hour day-of-month month day-of-week
# 0 17 * * 1 = Every Monday at 17:00 UTC
on:
  schedule:
    - cron: '0 17 * * 1'

  # Allow manual trigger via GitHub UI
  workflow_dispatch:

jobs:
  sprint-rotation:
    runs-on: ubuntu-latest
    name: Close Previous Sprint & Create New Sprint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sprint Rotation
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BOARD_ID: ${{ secrets.JIRA_BOARD_ID }}
        run: |
          python scripts/sprint_manager.py

      - name: Post to Slack (Optional)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Weekly Sprint Rotation Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ Weekly Sprint Rotation Completed\n\n*Date:* ${{ github.event.head_commit.timestamp }}\n*Action:* Sprint transition successful"
                  }
                }
              ]
            }

      - name: Handle Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Weekly Sprint Rotation Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ Weekly Sprint Rotation Failed\n\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease check the logs for details."
                  }
                }
              ]
            }
